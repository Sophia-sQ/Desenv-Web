<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exemplo Exercício Desvio Condicional – Validação Número</title>
    <!--Conecta o HTML ao CSS-->
    <link rel="stylesheet" href="style.css">
</head>
<!--Conecta o HTML ao JavaScript-->
<script src="script.js"></script>
<body>
    <!--diva onde a área de entrada e textos se encontrarão-->
    <div class="container">
        <h1>Validação de Números</h1>
        <!--Ambiente para entrada de dados inteiros-->
        <input type="number" id="numero" placeholder="Digite um número">

        <!--Conecta o botão HTML a função validarNumero() no script.js-->
        <button onclick="validarNumero()">Validar</button>
        <p id="mensagem"></p>
    </div>

</body>
</html>
